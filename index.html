<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Githhub Issues Tracker </title>
    <!-- daisy UI and tailwind css  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Fontawesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- stylesheet -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="flex justify-center items-center bg-[#F8FAFC] w-[100vw]">
    <header></header>
    <main class="flex flex-col min-h-[60vh] min-w-[30%] bg-white p-8">
        <section id="top-section" class="flex flex-col justify-center items-center">
            <div class="github-logo"><img src="./assets/github-logo.png" alt="github logo"/></div>
            <div class="top-title font-semibold text-2xl text-[#1F2937] mt-6">GitHub Issues Tracker</div>
            <div class="top-subtitle text-[#64748B] mt-1">Sign in to manage your issues</div>
        </section>
        <section id="login">
            <fieldset class="fieldset">

                <label class="label font-medium text-[#1F2937]">Username</label>
                <input type="text" class="input cursor-pointer" placeholder="Enter Username" id="email" required/>

                <label class="label font-medium text-[#1F2937]">Password</label>
                <input type="password" class="input cursor-pointer" placeholder="Password" id="pass" required/>

                <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </section>
        <section id="bottom-section" class="mt-6">
            <div class="btm-title uppercase text-center">or</div>
            <div class="btm-subtite text-[#64748B] text-center mt-6">Demo Credentials:</div>
            <div class="btm-info-cont bg-[#F8FAFC] p-6 rounded-lg text-center">
                <div class="data1"><strong>Username:</strong>admin</div>
                <div class="data2"><strong>Password:</strong> admin123</div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="./script/script.js"></script>

</body>

</html>
